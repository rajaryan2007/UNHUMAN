name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $sdkVersion = "1.4.313.0"
          $installerUrl = "https://sdk.lunarg.com/sdk/download/$sdkVersion/windows/VulkanSDK-$sdkVersion-Installer.exe"
          $installerPath = "$env:TEMP\VulkanSDK-Installer.exe"
          
          Write-Host "Downloading Vulkan SDK $sdkVersion..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
          
          Write-Host "Installing Vulkan SDK silently..."
          Start-Process -FilePath $installerPath -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          
          $sdkPath = "C:\VulkanSDK\$sdkVersion"
          Write-Host "Setting VULKAN_SDK=$sdkPath"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Run Setup Script (download Slang etc.)
        run: python script/Setup.py

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DVG_PROFILE=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare artifact
        shell: pwsh
        run: |
          $outDir = "bin/Release-windows-x64"
          $artifactDir = "release-package"
          New-Item -ItemType Directory -Force -Path $artifactDir

          # Copy all executables and DLLs from the output directory
          if (Test-Path $outDir) {
            Copy-Item "$outDir/*" -Destination $artifactDir -Recurse -Force
          }

          # Copy editor assets alongside the executable
          if (Test-Path "UHE_EDITOR/assets") {
            Copy-Item "UHE_EDITOR/assets" -Destination "$artifactDir/assets" -Recurse -Force
          }

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: UHE-Editor-Windows-x64
          path: release-package/
          retention-days: 30
