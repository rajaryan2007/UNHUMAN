<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Attenuation/Radius boundary -->
  <circle cx="50" cy="50" r="42" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="3" stroke-dasharray="8 8" />
  
  <!-- Core light center -->
  <circle cx="50" cy="50" r="10" fill="#FFD700" />
  
  <!-- Omnidirectional Rays -->
  <!-- Cardinal -->
  <line x1="50" y1="28" x2="50" y2="14" />
  <line x1="50" y1="72" x2="50" y2="86" />
  <line x1="28" y1="50" x2="14" y2="50" />
  <line x1="72" y1="50" x2="86" y2="50" />
  
  <!-- Ordinal (Diagonal) -->
  <line x1="34" y1="34" x2="24" y2="24" />
  <line x1="66" y1="66" x2="76" y2="76" />
  <line x1="34" y1="66" x2="24" y2="76" />
  <line x1="66" y1="34" x2="76" y2="24" />
